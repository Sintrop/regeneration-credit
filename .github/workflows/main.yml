# This is a basic workflow to help you get started with Actions

name: CI

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the main branch
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
  
env:
  SAC_TOKENS_TOTAL_TOKENS: "1500000000000000000000000000"
  DEVELOPER_POOL_BLOCKS_PER_ERA: 10
  DEVELOPER_POOL_ERA_MAX: 18
  DEVELOPER_POOL_FUNDS: "15000000000000000000000000"
  ISA_POOL_FUNDS: 0
  SINTROP_TIME_BETWEEN_PRODUCER_INSPECTIONS: 1000
  PRODUCER_LIMIT_ISA_SCORE: 1000
  PRODUCER_POOL_FUNDS: "750000000000000000000000000"
  PRODUCER_POOL_HALVING: 72
  PRODUCER_POOL_TOTAL_ERAS: 72
  PRODUCER_POOL_BLOCKS_PER_ERA: 100
  SINTROP_BLOCKS_TO_EXPIRE_ACCEPTED_INSPECTION: 10
  SINTROP_ALLOWED_INITIAL_REQUESTS: 1

jobs:

  Tests:

    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      - name: Setup NodeJS 14
        uses: actions/setup-node@v2
        with:
          node-version: '14'
      - name: Show NodeJS version  
        run: npm --version
      - name: Instal Ganache
        run: npm install -g ganache-cli
      - name: Run Ganache
        run: npm run ganache:start -q &
      - name: Install Truffle
        run: npm install truffle -g
      - name: Install Truffle Dependencies
        run: npm install
      - name: Run Truffle Test with CI=true for Codechecks  
        run: CI=true truffle test

  Code_Quality:

    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      - name: Setup NodeJS 14
        uses: actions/setup-node@v2
        with:
          node-version: '14'
      - name: Install Dependencies
        run: npm install
      - name: Run Solhint
        run: npx solhint **/*.sol
      - name: Run Prettier
        run: npx prettier -c test/
