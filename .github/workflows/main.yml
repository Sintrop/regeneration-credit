# This is a basic workflow to help you get started with Actions

name: CI

# Controls when the workflow will run
on:
  push:
    branches-ignore:
      - main
  pull_request:


  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
  
env:
  RC_TOTAL_TOKENS: "1270000000000000000000000000"
  REGENERATOR_POOL_FUNDS: "750000000000000000000000000"
  INSPECTOR_POOL_FUNDS: "180000000000000000000000000"
  DEVELOPER_POOL_FUNDS: "40000000000000000000000000"
  CONTRIBUTOR_POOL_FUNDS: "40000000000000000000000000"
  RESEARCHER_POOL_FUNDS: "40000000000000000000000000"
  ACTIVIST_POOL_FUNDS: "40000000000000000000000000"
  BLOCKS_PER_ERA: 1152000
  POOL_HALVING: 12
  SECURITY_BLOCKS_TO_VALIDATION: 96000
  BLOCKS_TO_EXPIRE_ACCEPTED_INSPECTION: 50000
  ALLOWED_INITIAL_REQUESTS: 3
  ACCEPT_INSPECTION_DELAY_BLOCKS: 500
  TIME_BETWEEN_WORKS: 192000
  TIME_BETWEEN_VOTES: 1500
  MAX_PENALTIES: 3
  INSPECTOR_PROPORTIONALITY: 5
  ACTIVIST_PROPORTIONALITY: 10
  RESEARCHER_PROPORTIONALITY: 10
  DEVELOPER_PROPORTIONALITY: 10
  CONTRIBUTOR_PROPORTIONALITY: 10

jobs:

  Specs:

    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      - name: Setup NodeJS 20
        uses: actions/setup-node@v2
        with:
          node-version: '20'
      - name: Show NodeJS version  
        run: npm --version
      - name: Instal Packages
        run: npm install
      - name: Run Specs
        run: npm run test

  Code_Quality:

    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      - name: Setup NodeJS 20
        uses: actions/setup-node@v2
        with:
          node-version: '20'
      - name: Install Dependencies
        run: npm install
      - name: Run Solhint
        run: npx solhint **/*.sol
      - name: Run Prettier
        run: npx prettier -c test/
